# ---------------------------------------------------------------------------
# Default values — overridden per environment via values-<env>.yaml
# ---------------------------------------------------------------------------

replicaCount: 1

image:
  repository: ghcr.io/DevilFlow92/associazione-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

# NOTE: runAsNonRoot is false because the uv base image runs as root (uid 0).
# To harden further, add a non-root user in the Dockerfile and set runAsUser: 1000.
podSecurityContext:
  runAsNonRoot: false
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: associazione-api.local
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Application environment variables
# ---------------------------------------------------------------------------
config:
  appEnv: production
  appDebug: "false"
  logLevel: INFO

# ---------------------------------------------------------------------------
# Secrets — valori placeholder, da sovrascrivere con Sealed Secrets / ESO
# ---------------------------------------------------------------------------
secret:
  databaseUrl: ""
  secretKey: ""

# ---------------------------------------------------------------------------
# Migration Job (Alembic)
# ---------------------------------------------------------------------------
migrations:
  enabled: true
  ttlSecondsAfterFinished: 120

# ---------------------------------------------------------------------------
# Uploads — persistent storage for uploaded PDF files
# ---------------------------------------------------------------------------
uploads:
  # Set to true to use a PersistentVolumeClaim (recommended for staging/prod).
  # Set to false to use an emptyDir (data lost on pod restart — dev only).
  persistent: false
  size: 1Gi
  storageClass: ""
  mountPath: /app/uploads