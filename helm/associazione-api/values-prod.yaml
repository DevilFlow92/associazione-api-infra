replicaCount: 3

image:
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: true
  host: associazione-api.example.com
  tls:
    - secretName: associazione-api-prod-tls
      hosts:
        - associazione-api.example.com

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

config:
  appEnv: production
  appDebug: "false"
  logLevel: WARNING

# In produzione gli upload devono essere persistenti
uploads:
  persistent: true
  size: 10Gi
  storageClass: ""