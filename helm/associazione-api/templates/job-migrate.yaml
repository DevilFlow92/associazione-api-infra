{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "associazione-api.migrationJobName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "associazione-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Esegue il Job prima del Deployment (hook pre-upgrade e pre-install)
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "associazione-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "associazione-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Running Alembic migrations..."
              uv run alembic upgrade head
              echo "Migrations complete."
          envFrom:
            - configMapRef:
                name: {{ include "associazione-api.fullname" . }}
            - secretRef:
                name: {{ include "associazione-api.fullname" . }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}