apiVersion: v1
kind: Secret
metadata:
  name: {{ include "associazione-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "associazione-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  DATABASE_URL: {{ .Values.secret.databaseUrl | b64enc | quote }}
  SECRET_KEY: {{ .Values.secret.secretKey | b64enc | quote }}
  # JWT signing key per i service account (firma token macchina-a-macchina).
  JWT_SECRET_KEY: {{ .Values.secret.jwtSecretKey | b64enc | quote }}
  {{- if .Values.secret.migrationDatabaseUrl }}
  # URL dell'owner dello schema, usato dal Job Alembic per il DDL. Distinto dal
  # ruolo a privilegio minimo (app_rw) con cui gira l'app a runtime.
  MIGRATION_DATABASE_URL: {{ .Values.secret.migrationDatabaseUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.bootstrapAdminPassword }}
  # Password del superuser di bootstrap creato dalla migrazione auth/RBAC.
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secret.bootstrapAdminPassword | b64enc | quote }}
  {{- end }}