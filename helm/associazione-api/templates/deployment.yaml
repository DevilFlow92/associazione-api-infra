apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "associazione-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "associazione-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "associazione-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "associazione-api.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "associazione-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.migrations.enabled }}
        - name: wait-for-migration
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for migration job to complete..."
              sleep 5
          envFrom:
            - configMapRef:
                name: {{ include "associazione-api.fullname" . }}
            - secretRef:
                name: {{ include "associazione-api.fullname" . }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "associazione-api.fullname" . }}
            - secretRef:
                name: {{ include "associazione-api.fullname" . }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Writable /tmp required by readOnlyRootFilesystem
            - name: tmp
              mountPath: /tmp
            # uv writes package cache here at runtime
            - name: uv-cache
              mountPath: /root/.cache
            # Uploaded PDF files
            - name: uploads
              mountPath: {{ .Values.uploads.mountPath }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: uv-cache
          emptyDir: {}
        {{- if .Values.uploads.persistent }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "associazione-api.fullname" . }}-uploads
        {{- else }}
        - name: uploads
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}