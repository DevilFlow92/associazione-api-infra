name: Release Chart

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Package & Release Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" \
            helm/associazione-api/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" \
            helm/associazione-api/Chart.yaml

      - name: Helm lint before package
        run: helm lint helm/associazione-api

      - name: Package Helm chart
        run: |
          helm package helm/associazione-api \
            --destination .chart-output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## associazione-api-infra ${{ github.ref_name }}

            ### Helm chart
            Download the chart package from the assets below and install with:

            helm install associazione-api ./associazione-api-${{ steps.version.outputs.VERSION }}.tgz \
              -f values-prod.yaml \
              --set secret.databaseUrl=YOUR_DB_URL \
              --set secret.secretKey=YOUR_SECRET_KEY \
              -n associazione-api-prod

            ### What's changed
            See commits at ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}
          files: .chart-output/*.tgz
          draft: false
          prerelease: false
